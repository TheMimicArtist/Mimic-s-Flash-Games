<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic's Flash Arcade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff4a4a;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        label {
            font-weight: bold;
            margin-right: 10px;
        }

        select {
            padding: 8px 12px;
            font-size: 16px;
            background-color: #333;
            color: #fff;
            border: 2px solid #ff4a4a;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            box-shadow: 0 0 8px #ff4a4a;
        }

        #arcade-container {
            width: 800px;
            height: 600px;
            background-color: #000;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            overflow: hidden;
            position: relative;
        }

        /* Styling for the Ruffle Flash Object wrapper */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Loads the standalone Ruffle emulator engine -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <h1>🕹️ Mimic's Flash Arcade</h1>

    <div class="controls">
        <label for="gameSelect">Choose a Game:</label>
        <select id="gameSelect" onchange="loadGame(this.value)">
            <option value="">-- Select a Game --</option>
            <!-- START GAMES DROPDOWN -->
            <option value="AppleQuest.swf">Applequest</option>
            <option value="Banned_From_Equestria.swf">Banned From Equestria</option>
            <option value="Cloptopia_v1.22b.swf">Cloptopia V1.22B</option>
            <option value="MlpSimDating.swf">Mlpsimdating</option>
            <option value="PonkQuest.swf">Ponkquest</option>
            <option value="Rainbow Dash Attack.swf">Rainbow Dash Attack</option>
            <option value="milf_quest.swf">Milf Quest</option>
            <option value="pinktactoe.swf">Pinktactoe</option>
        <!-- END GAMES DROPDOWN -->
        </select>
    </div>

    <div id="arcade-container">
        <!-- Ruffle player gets inserted dynamically right here -->
    </div>

    <script>
        const ruffle = window.RufflePlayer.newest();
        const container = document.getElementById("arcade-container");
        let player = null;

        function loadGame(swfFile) {
            // Clear the player canvas if no game is selected
            if (!swfFile) {
                container.innerHTML = '';
                return;
            }

            // Wipe out the old game instance before loading a new one
            container.innerHTML = '';
            
            // Create a fresh instance of the emulator player
            player = ruffle.createPlayer();
            container.appendChild(player);

            // Fire up the local .swf file
            player.load({
                url: swfFile,
                allowScriptAccess: false
            });
        }
    </script>

</body>
</html>
