<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mimic's Flash Games</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            color: #0f0; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        #container { 
            margin: 20px auto; 
            border: 4px solid #0f0; 
            max-width: 900px; 
            background: #000; 
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 { 
            color: #0ff; 
        }
        p { 
            color: #aaa; 
        }
        .selector-container {
            margin: 20px auto;
        }
        label {
            color: #fff;
            font-size: 18px;
            margin-right: 10px;
        }
        select {
            padding: 10px 20px;
            font-size: 18px;
            background: #222;
            color: #0ff;
            border: 2px solid #0ff;
            cursor: pointer;
            border-radius: 5px;
        }
        select:focus {
            outline: none;
        }
        button { 
            padding: 12px 30px; 
            font-size: 18px; 
            margin: 10px; 
            background: #222; 
            color: #0ff; 
            border: 2px solid #0ff; 
            cursor: pointer; 
        }
        button:hover { 
            background: #0ff; 
            color: #000; 
        }
    </style>
</head>
<body>
    <h1>🕹️ Mimic's Flash Games</h1>
    <p>Private retro collection for the server 💋</p>
    
    <div class="selector-container">
        <label for="game-select">Choose a Game:</label>
        <select id="game-select" onchange="loadGame()">
            <option value="" disabled selected>Select a game to play...</option>
            <option value="milf_quest.swf">Milf Quest</option>
            <option value="Banned_From_Equestria.swf">Banned From Equestria</option>
        </select>
    </div>

    <h3 id="game-title" style="color: yellow; min-height: 24px;"></h3>
    
    <button onclick="toggleFullscreen()" id="fsBtn" style="display:none;">⛶ Fullscreen</button>

    <div id="container">
        <p id="placeholder-text" style="color: #555;">Select an arcade cartridge above to begin loading</p>
    </div>

    <script src="ruffle-0.2.0-web-selfhosted/ruffle.js"></script>
    <script>
        let currentPlayer = null;

        async function loadGame() {
            const selectMenu = document.getElementById('game-select');
            const selectedGame = selectMenu.value;
            
            if (!selectedGame) return; // Do nothing if blank placeholder is hit

            // Dynamically set the header title
            const cleanTitle = selectedGame.replace('.swf', '').replace(/_/g, ' ').replace(/-/g, ' ').toUpperCase();
            document.getElementById('game-title').innerText = `NOW PLAYING: ${cleanTitle}`;

            const container = document.getElementById('container');
            container.innerHTML = `<p style="color:yellow;">Loading ${selectedGame}...</p>`;

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            player.style.width = "800px";
            player.style.height = "600px";

            container.innerHTML = '';
            container.appendChild(player);
            currentPlayer = player;

            document.getElementById('fsBtn').style.display = 'inline-block';

            try {
                await player.load({ url: selectedGame });
            } catch (e) {
                container.innerHTML = `<p style="color:red;">Error loading ${selectedGame}. Verify filename casing and make sure it's pushed to GitHub!</p>`;
            }
        }

        function toggleFullscreen() {
            if (currentPlayer) currentPlayer.enterFullscreen();
        }
    </script>
</body>
</html>
